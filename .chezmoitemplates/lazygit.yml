# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

git:
  fetchAll: false
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"

os:
  editPreset: 'nvim-remote'

customCommands:
  - key: '<c-P>'
    description: "Push to a specific remote repository"
    context: 'global'
    loadingText: 'Pushing ...'
    prompts:
      - type: 'menuFromCommand'
        title: 'Which remote repository to push to?'
        command: bash -c "git remote --verbose | grep '/.* (push)'"
        filter: '(?P<remote>.*)\s+(?P<url>.*) \(push\)'
        valueFormat: '{{`{{ .remote }}`}}'
        labelFormat: '{{`{{ .remote | bold | cyan }} {{ .url }}`}}'
      - type: 'menu'
        title: 'How to push?'
        options:
          - value: 'push'
          - value: 'push --force-with-lease'
          - value: 'push --force'
    command: "{{`git {{index .PromptResponses 1}} {{index .PromptResponses 0}}`}}"

gui:
  nerdFontsVersion: '3'

{{- if eq .chezmoi.group "staff" }}
services:
  '{{ .ghe_url }}': 'github:{{ .ghe_url }}'
{{- end }}
